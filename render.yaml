services:
  - type: web
    name: leftoverlunch
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "cd leftoverlunch && python create_admin.py && gunicorn leftoverlunch.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leftovers-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2

databases:
  - name: leftovers-db
    plan: free
